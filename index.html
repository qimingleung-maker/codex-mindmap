  aside{grid-column:2;grid-row:2;border-left:2px solid #111;background:#fff;padding:18px;overflow:auto;z-index:12}.app.sidebar-closed{grid-template-columns:1fr}.app.sidebar-closed aside{display:none}.panel-head{display:grid;gap:10px;border-bottom:1.5px solid #111;padding-bottom:14px;margin-bottom:15px}.panel-title-row{display:flex;align-items:center;justify-content:space-between;gap:10px}.panel-head h2{font-size:14px;margin:0;font-weight:850}.sidebar-controls{display:grid;grid-template-columns:1fr 1.25fr;gap:7px}.sidebar-mode-btn{border:1.35px solid #111;border-radius:8px;background:#fff;color:#000;padding:8px 9px;cursor:pointer;font-size:11px;font-weight:800;line-height:1.2}.sidebar-mode-btn:hover{background:#f0f0f0}.sidebar-mode-btn.active{background:#000;color:#fff}.sidebar-mode-btn.close:hover{background:#000;color:#fff}.sidebar-reopen{display:none;position:absolute;right:16px;top:16px;z-index:11;border:1.5px solid #111;border-radius:9px;background:#fff;color:#000;padding:9px 12px;cursor:pointer;font-size:12px;font-weight:850;box-shadow:var(--shadow)}.sidebar-reopen:hover{background:#000;color:#fff}.app.sidebar-closed .sidebar-reopen{display:block}.status{font-size:10px;padding:4px 7px;border:1px solid #000;background:#fff;color:#000;border-radius:999px;font-weight:760}.empty{color:#222;font-size:13px;line-height:1.7;padding:10px 0}.crumb{font-size:11px;color:#333;line-height:1.55;margin-bottom:10px;font-weight:650}.detail-title{font-size:20px;line-height:1.25;margin:0 0 8px;letter-spacing:.01em;font-weight:900}.detail-summary{font-size:13px;color:#111;line-height:1.7;margin:0 0 15px;font-weight:520}.detail-section{margin:16px 0}.section-title-row{display:flex;align-items:center;justify-content:space-between;gap:10px;margin:0 0 8px}.detail-section h3{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:#000;margin:0;font-weight:850}.detail-section p{font-size:12px;color:#111;line-height:1.7;margin:0}.steps{margin:0;padding-left:20px;color:#000}.step <body>
<div class="app">
  <main class="canvas-wrap" id="canvas">
    <div id="viewport"><div class="world" id="world"><svg class="edges" id="edges" viewBox="-5000 -5000 10000 10000" aria-hidden="true"></svg><div class="controls" id="controls"></div><div id="nodes"></div></div></div>
    <div class="toolbar" aria-label="画布缩放与分支控制"><button class="toolbtn" id="zoomOut" title="缩小">−</button><button class="toolbtn" id="zoomIn" title="放大">＋</button><button class="toolbtn primary" id="expandAll">展开全部</button><button class="toolbtn" id="collapseAll" title="收起到一级">收起</button></div>
    <div class="search-wrap search-in-canvas" role="search" aria-label="搜索思维导图节点">
      <span class="search-icon" aria-hidden="true">⌕</span>
      <input id="search" placeholder="搜索：AGENTS、测试、工作树…" autocomplete="off" aria-label="搜索节点" />
      <span class="kbd" aria-hidden="true">/</span>
      <div id="searchResults" class="search-results" role="listbox" aria-label="搜索结果"></div>
    </div>
    <button type="button" id="sidebarToggle" class="sidebar-toggle" title="关闭右侧侧边栏" aria-label="关闭右侧侧边栏" aria-expanded="true">
      <span></span><span></span><span></span>
    </button>
  </main>
  <aside id="detailPanel" aria-label="右侧节点操作栏"><div id="detail"><div class="empty">点击节点打开操作卡；在 iPad/iPhone 上可单指拖动画布、双指缩放。<br><br>建议首次按顺序阅读：<br>① 目标与边界 → ② 只读预检与规则 → ③ 执行空间 → ④ 执行与验证 → ⑤ 安全、交付、容器与能力库；<br>之后把它当成每次给 Codex 派活前的检查表。</div></div></aside>
</div>
<div id="tooltip" class="annotation-popover" role="dialog" aria-live="polite"></div><div id="toast" class="toast"></div>
<script>
const data={
 id:'root',title:'Codex 专业工作总图',sub:'澄清 → 受控环境 → 最小实现 → 证据验证 → 可回滚交付',side:'root',
 summary:'这不是“让 AI 多写代码”的导图，而是一套让你从入门到专业都能稳定交付的操作系统：先把意图、边界与风险说清，再让 Codex 在受控环境中完成最小正确改动，最后用证据验证并留下可维护的项目状态。',
 note:'总原则：<b>先让 Codex 解释、调查、计划；再允许它实施。</b>任何涉及真实数据、付费、账户、生产环境、隐私或不可逆变更的任务，都必须设置人工审批点。',
 steps:['先判断任务属于哪类：研究、规划、修复、功能、重构、审查、自动化、内容或设计。','用任务卡锁定目标、范围、约束、验收与风险。','先读规则与现状，再选择本地、工作树、容器或远程环境。','用小步循环完成：调查 → 计划 → 实施 → 验证 → 交付。','把可复用流程沉淀为 AGENTS.md、Skill、脚本、测试和交接文档。'],
 prompt:'先不要修改任何文件。请把以下任务转化为执行任务卡：\n1) 目标与用户价值；2) 非目标；3) 允许/禁止改动范围；\n4) 风险与审批点；5) 验收标准；6) 最小实施计划。\n若信息不足，请只提出最关键的澄清问题。',
 children:[
  {id:'brief',title:'01 目标、范围与决策',sub:'先定义“做对什么”，再写代码',side:'left',
   summary:'高质量代理使用从“把模糊愿望变成可验收任务”开始。先区分：现在真的需要代码吗？还是需要调研、原型、流程设计、文案、数据分析或人工决策。',
   note:'控制代码膨胀的第一步：<b>非目标写清楚。</b>没有明确写入范围的“顺手优化”“通用抽象”“额外依赖”默认不做。',
   steps:['选择任务模式：只读调研 / 制定计划 / 实施 / 审查 / 交付。','写明业务结果、目标用户、输入、输出和完成定义。','列出非目标、禁止改动、成本/时间/依赖约束。','把无法确定的业务规则标记为“先问我，不要猜”。'],
   prompt:'任务类型：{调研/计划/修复/新功能/重构/审查}\n目标：{用户可观察到的结果}\n非目标：{明确不做的内容}\n允许修改：{目录/文件/服务}\n禁止：{接口、数据、视觉、依赖或外部操作}\n验收：{命令、测试、手测场景}\n请先复述理解、指出缺口，并给出最小计划。',
   children:[
    {id:'taskcard',title:'任务卡：必填 6 项',sub:'目的 / 输入输出 / 范围 / 约束 / 验收 / 交付',summary:'将复杂需求固定成同一种任务卡，Codex 才能少猜、少返工、少越界。',note:'例：<b>输入</b>用户上传图片；<b>输出</b>压缩后的 WebP；<b>边界</b>不上传云端；<b>验收</b>10MB 原图压到 2MB 内并保留透明通道。',steps:['目的：解决谁的什么问题。','输入/输出：真实用户或系统行为。','范围：页面、模块、数据、服务和允许修改目录。','约束：安全、性能、风格、预算、兼容性。','验收：命令、测试、手测与“不应发生的事”。','交付：代码、说明、截图、提交或发布包。'],prompt:'请按任务卡补全信息：\n- 目的：…\n- 输入：…\n- 输出：…\n- 允许修改：…\n- 禁止改动：…\n- 验收命令/场景：…\n- 交付物：…\n缺失项请用问题向我确认，未确认前不要编码。'},
    {id:'decision',title:'先决策：代码是否真是答案',sub:'研究 / 原型 / 流程 / 代码，选最小成本路径',summary:'专业使用者不会把每个问题都交给代码。先用调研、纸面流程、静态原型、手工试运行确认价值，再决定是否工程化。',note:'例：想做“自动选图工具”时，先让 Codex 做筛选标准、手工流程和 20 张样本评估；只有规则稳定后再开发。',steps:['先验证问题是否真实、频率是否足够高。','先尝试无代码或低代码最小方案。','明确何时从手工流程升级为脚本/工具/产品。','记录关键取舍，避免以后反复推翻。'],prompt:'在写代码前，请对 {问题} 给出 3 种方案：手工流程、轻量脚本/原型、正式系统。分别比较成本、风险、可维护性、适用条件，并推荐最小可验证方案。'},
    {id:'done',title:'完成定义（DoD）',sub:'让“完成”可测试、可演示、可交接',summary:'没有验收标准的完成只是主观感觉。每项完成定义必须能被命令、测试或具体操作证明。',note:'一个登录功能不是“页面能打开”就完成；至少应覆盖：表单校验、失败提示、成功跳转、会话、移动端、构建与回归。',steps:['功能行为通过。','相关静态检查、类型检查与构建通过。','核心成功和失败路径已手测。','变更、限制、风险与回滚已写入交付。'],prompt:'在实施前，为此任务写不超过 8 条 DoD。每条必须可由测试、命令或手动步骤验证；同时补 2 条“不应发生”的反向验收。'}]},

  {id:'context',title:'02 上下文、规则与只读预检',sub:'先确认状态与规则，再选择执行环境',side:'left',
   summary:'实际工作中，02 不应被 03 完全替代。先进行零修改预检与只读侦察，确认当前目录、分支、规则、架构与风险；再基于这些证据选择工作树、容器或远程环境。',
   note:'推荐顺序：<b>01 定义任务 → 02 零修改预检＋读规则 → 03 建立隔离执行空间 → 04 实施与验证。</b>不要一开始就武断决定容器或远程方案，也不要在未检查 Git 状态时直接改代码。',
   steps:['零修改预检：确认目录、git status、当前分支、是否生产环境与未提交改动。','再读 README、AGENTS.md、依赖清单、目标入口与相关测试。','识别架构边界：UI、领域逻辑、数据、外部服务与部署。','发现文档和代码冲突时先报告，不自行选择。','基于已知依赖、风险与复现要求，再决定 03 的执行环境。'],
   prompt:'先进行只读预检与侦察：\n1) 确认当前目录、git status、分支、未提交改动与是否可能连接生产；\n2) 找到 README、AGENTS.md、依赖清单、运行与验证命令；\n3) 说明目标功能的入口、数据流、测试与外部依赖；\n4) 推荐下一步应使用当前分支 / worktree / Dev Container / Remote-SSH 的哪一种，并说明理由；\n5) 暂不修改文件。',
   children:[
    {id:'preflight',title:'零修改预检：先确认“哪里能动”',sub:'目录 / 分支 / 未提交改动 / 环境风险',summary:'在读取较深的代码、安装依赖或执行命令前，先确认当前工作目录是否正确、是否有未提交工作、是否可能误连生产环境。它是 02 与 03 之间的桥梁。',note:'先做轻量检查，而不是先决定完整容器方案：<b>pwd、git status、git branch、git worktree list、.env / 环境标记、项目运行说明。</b>没有这些信息时，不要让 Codex直接改。',steps:['确认项目根目录与当前分支。','检查 git status、未跟踪文件与现有 worktree。','识别 .env、生产配置、数据迁移或外部写入风险。','确认本任务是否适合当前目录，还是应转入新 worktree / 容器 / 远程主机。'],prompt:'只读执行预检，不修改、不安装、不启动可能写数据的服务。请输出：当前目录、Git 状态/分支、已有 worktree、疑似敏感配置、是否可能触及生产、推荐的安全执行位置与原因。'},
    {id:'agents',title:'AGENTS.md：项目的代理操作手册',sub:'规则、命令、边界、交付格式',summary:'把可执行的项目规则外置，使 Codex 每次都能遵循相同标准，而不是依赖你重复口述。',note:'最有价值的内容：<b>仓库结构、启动/测试命令、代码约定、禁止区域、验证顺序、交付格式。</b>',steps:['根目录放通用规则；子目录只放更细的局部规则。','规则必须可执行、可验证，避免抽象口号。','写明哪些文件不能直接编辑、哪些改动必须附测试。','每次出现高频错误，就把防错规则补入文档。'],prompt:'# AGENTS.md\n## 项目结构\n- app/: …\n## 常用命令\n- dev: …\n- test: …\n- lint: …\n## 规则\n- 修改 API 时同步更新 …\n- 不得编辑 …\n## 交付\n- 最终报告必须含：修改、测试、风险、回滚方式。'},
    {id:'readfirst',title:'只读侦察：最少但足够',sub:'规则 → 入口 → 契约 → 近期改动',summary:'读得太少会误改；读得太多会浪费时间。先找决定“怎么运行、哪里改、怎么验证”的少量文件。',note:'改 React 页面时通常先看：<b>路由 → 页面/组件 → 类型/API → 测试 → 样式规范 → 最近 diff</b>，而不是扫描全仓库。',steps:['README / AGENTS.md：规则与命令。','package.json / lockfile：技术栈和脚本。','目标路由、组件、服务：真实入口。','类型、接口、测试：真实契约。','git diff / 最近提交：当前变化与冲突。'],prompt:'围绕 {目标功能}，只读取完成修改所必需的文件。按“规则→入口→依赖→测试→近期变更”列出文件与原因，并说明尚未确认的假设。'},
    {id:'architecture',title:'架构与可维护性：少而清楚',sub:'复用现有模式；避免投机抽象',summary:'可维护不是层数更多，而是边界清晰、依赖方向稳定、命名一致、测试容易、删除容易。每个新增抽象都应有当前真实需求。',note:'默认策略：<b>优先复用现有模式；先写直接、局部、可测的实现；只有第二/第三处真实重复出现时再抽象。</b>',steps:['先找项目已有的相似实现并沿用模式。','一个模块只承担一个清晰责任。','避免“为了以后”提前加框架、状态层或通用工厂。','新增依赖前说明收益、替代方案、维护成本和退出方式。','删掉死代码、无用开关、过期注释与无关格式化。'],prompt:'请审查该方案的可维护性：\n- 可复用的现有模式是什么？\n- 哪些新增抽象/依赖并非当前必需？\n- 如何将实现缩小为最小清晰版本？\n- 哪些边界最值得加测试？\n不要为了“通用性”引入额外层。'}]},

  {id:'workspace',title:'03 选择并建立执行空间',sub:'基于 02 的证据，隔离任务、环境与风险',side:'left',
   summary:'03 的决定应该建立在 02 的只读预检之后：已知项目依赖、当前 Git 状态、任务复杂度、数据风险与复现要求，才能选择最小且足够的执行空间。',
   note:'底线：<b>不在生产环境探索；不让多个代理同时写同一个目录或同一组共享文件；不把业务账号/凭据混进开发环境。</b>',
   steps:['先根据 02 的结果选择当前分支 / 新分支 / Git worktree / Dev Container / SSH。','中大型任务：独立分支或 Git worktree。','依赖复杂、团队协作或环境污染风险：Dev Container。','远程算力或 Linux 服务：SSH Remote；生产只做受控操作。'],
   prompt:'基于刚完成的只读预检，为本任务选择最小且足够的执行空间：当前分支 / 新分支 / Git worktree / Dev Container / SSH。请说明：选择依据、最小准备项、数据/密钥边界、验证方式与回滚路径。',
   children:[
    {id:'worktree',title:'Worktree：并行但不互相踩',sub:'一任务一目录一分支',summary:'同一仓库同时拥有多个独立目录和分支，适合比较方案、修不同问题、让多个代理并行。',note:'例：<b>main</b> 保持稳定；<b>feature/image-tool</b> 做功能；<b>fix/upload-bug</b> 修问题。每个工作树有自己的 diff 和依赖状态。',steps:['主分支保持可运行、可回滚。','每个目标单独开工作树与分支。','任务结束先审 diff、跑验证，再考虑合并。','不要让不同工作树共用会写入的本地数据库、缓存或 .env。'],prompt:'为以下方案创建隔离工作树：\nA：{方案A}\nB：{方案B}\n分别实现最小可验证版本，输出 diff 概览、测试结果、复杂度/风险比较；不要自动合并。'},
    {id:'env',title:'环境选择：本地 / 容器 / SSH',sub:'按风险、复现性与成本选择',summary:'环境不是越复杂越好。选择能稳定复现、隔离充分、成本最低的方式。',note:'判断口诀：<b>小型前端学习→本地；依赖复杂或需一致→Dev Container；重算力/服务端→SSH；生产→仅受控发布与诊断。</b>',steps:['本地：快，适合学习和小型项目。','Dev Container：依赖锁定、迁移简单、团队一致。','SSH Remote：算力、Linux、远端服务开发。','生产：限定命令、备份、审批、日志与回滚。'],prompt:'根据任务的依赖、风险、算力、数据敏感性和是否需要他人复现，推荐本地 / Dev Container / SSH。说明理由、准备清单、禁止事项和不适用情形。'},
    {id:'baseline',title:'安全基线：先保护再开发',sub:'分支、忽略文件、最小权限、可回滚',summary:'稳定的项目先有最小安全基线，再谈速度。',note:'建议最早建立：<b>.gitignore、.env.example、备份策略、环境分层、格式化/lint、最小 CI、可用的 README。</b>',steps:['确认 .env、私钥、缓存、构建产物不进入 Git。','区分开发、测试、生产配置。','为数据迁移、部署和外部 API 写回滚步骤。','最小 CI 至少运行格式、lint、类型/测试或构建。'],prompt:'请为当前项目生成安全基线检查表：Git 忽略、环境变量、环境分层、备份/回滚、CI、日志脱敏、依赖更新、部署审批。标出 P0/P1/P2 优先级。'}]},

  {id:'loop',title:'04 执行闭环与精炼代码',sub:'调查 → 计划 → 最小改动 → 审查',side:'left',
   summary:'专业代理工作不是一次大改，而是每一步都有下一步证据。通过“先调查、后计划、小步实施、持续审查”保持代码精炼且不累赘。',
   note:'防止 AI 代码膨胀：<b>不新增未被任务证明需要的依赖、层、配置、功能或重构。</b>每新增一处复杂度，都要说明它解决了哪条验收。',
   steps:['调查：复现、定位、确认影响范围。','计划：文件、顺序、风险、验收、回滚。','实施：一次只改一组强相关文件。','审查：范围、逻辑、错误路径、依赖与可删除性。','验证：自动化 + 手测 + diff；交付时如实报告。'],
   prompt:'按受控闭环执行：\nA. 只读调查并复现；\nB. 列文件、步骤、风险、验收与回滚；\nC. 每次只完成一个检查点；\nD. 每步后报告 diff 和验证；\nE. 超出范围或涉及高风险时暂停并询问。',
   children:[
    {id:'plan',title:'计划模式：先列行动，不急着写',sub:'复杂任务先求正确方向',summary:'计划适合多文件、数据/接口变更、需求不全或代价高的任务。好计划是可执行的变更顺序，而非泛泛说明。',note:'好计划回答：<b>改哪里、为什么、影响什么、怎么测、失败如何回退。</b>',steps:['定义成功标准、非目标与审批点。','列出要读/要改的文件与原因。','拆成能独立验证的步骤。','标记兼容性、数据、安全、性能与成本风险。','等你确认后才进行破坏性操作。'],prompt:'不要编码。请输出：\n1. 目标与非目标\n2. 将读取/修改的文件及原因\n3. 分步实施（每步含验证）\n4. 兼容性、数据、安全风险\n5. 回滚策略\n控制在 500 字内。'},
    {id:'smallsteps',title:'小步实施：一轮一个检查点',sub:'改一组 → 验证 → 汇报 → 再继续',summary:'将大任务拆成短循环，能防止“改了一堆才发现方向错”，也让你随时接管或停止。',note:'做支付页时可分为：<b>静态 UI/校验 → mock API → 真实服务接入 → 回调与异常</b>，不要一次全部改完。',steps:['优先完成最小可用的核心路径。','一次只动一个逻辑层或强相关文件组。','每步后看 diff、错误输出和测试。','禁止无关的格式化、重命名和顺手重构。'],prompt:'把任务拆为 3–5 个检查点。每完成一个检查点就停止并报告：修改文件、关键 diff、执行命令、结果、下一步。不得提前实现后续检查点。'},
    {id:'review',title:'Diff 审查：先审意图，再审细节',sub:'范围、行为、风险、可删除性',summary:'不要被大量生成代码迷惑。审查应回到任务卡：是否只改了该改的、是否保留既有行为、是否增加不必要复杂度。',note:'先问：<b>有没有改错文件、删掉旧行为、引入密钥、增加依赖、留下死代码、把异常吞掉？</b>',steps:['确认变更范围符合允许目录。','检查新增依赖、环境变量、配置和许可。','检查边界、空值、错误、并发与取消。','检查是否能删掉不必要的抽象和重复。','检查注释、文档、测试与代码是否一致。'],prompt:'请以严格审查者身份检查当前 diff。按“阻断问题 / 高风险 / 代码膨胀 / 可改进 / 通过项”分类；每条给出文件位置、原因、最小修复建议。不要直接修改。'}]},

  {id:'quality',title:'05 质量、验证与可观测性',sub:'测试 + 构建 + 场景 + 日志',side:'left',
   summary:'“能跑”不是可交付。稳定交付靠一条证据链：最相关测试、静态检查、构建、关键场景演练和能定位问题的日志。',
   note:'优先级不是追求测试数量，而是守住最易坏、最贵、最影响用户的路径。<b>每次真实 Bug 都应留下失败→通过的证据。</b>',
   steps:['先跑最快、最相关的检查。','再跑类型、lint、构建与必要的集成/E2E。','手测成功、边界、失败和恢复路径。','为关键流程保留结构化日志、错误上下文与监控入口。','交付时如实说明未跑、失败或依赖环境的验证。'],
   prompt:'为本次改动建立验证矩阵：\n- 自动化：单元 / 集成 / E2E（选择适用项）\n- 静态：格式 / lint / 类型\n- 构建：…\n- 手动：至少 3 个成功/失败场景\n- 可观测性：应记录哪些事件和错误\n请按成本从低到高执行并报告。',
   children:[
    {id:'tests',title:'测试策略：先保护最易坏处',sub:'业务规则、契约、关键旅程、回归',summary:'优先覆盖业务规则、Bug 根因、接口契约与核心用户流程，而不是为了覆盖率测试无价值的展示细节。',note:'价格计算更值得测：<b>折扣叠加、四舍五入、0/负数、优惠失效、不同币种</b>，而不是每个按钮的 className。',steps:['单元：纯函数、规则、边界。','集成：组件与接口、数据库或服务协作。','E2E：少量最关键用户旅程。','回归：每个 Bug 留一个失败→通过的用例或清晰复现。'],prompt:'请为 {功能/bug} 找出 5 个最高价值测试点：正常、边界、失败、兼容、回归。先写测试或复现步骤，再实施修复。'},
    {id:'observability',title:'可观测性：出了问题能定位',sub:'日志、错误、指标、任务状态',summary:'自动化与线上功能的价值不仅是成功，还要在失败时可追踪、可恢复、可人工接管。',note:'内容/图像批处理至少记录：<b>任务 ID、输入摘要、阶段、耗时、失败原因、输出位置、重试次数。</b>',steps:['给异步/批量任务分配任务 ID。','错误日志保留上下文但不得泄漏凭据和个人数据。','区分可重试、需人工处理和不可恢复失败。','提供状态、日志、重试和停止入口。'],prompt:'为 {功能} 设计最小可观测性方案：关键事件、日志字段、错误分类、重试规则、人工接管点、需要脱敏的字段。不要引入不必要的监控平台。'},
    {id:'verify',title:'交付验证报告',sub:'让你一眼判断能否合并或上线',summary:'固定交付格式能加快你的决策，也方便未来接手。',note:'优秀报告不会只说“完成”。它会说明：<b>改了什么、为什么、跑了什么、结果怎样、没验证什么、如何回滚。</b>',steps:['按用户行为写变更摘要。','列出新增/修改/删除文件。','记录验证命令、环境与结果。','列出已知限制、未验证项与风险。','提供回滚方式与推荐下一步。'],prompt:'请输出最终交付报告：\n1) 已完成（按行为描述）\n2) 关键实现与文件\n3) 验证命令与结果\n4) 未验证项/已知风险\n5) 回滚方式\n6) 推荐下一步。'}]},

  {id:'safe',title:'06 安全、审批与供应链',sub:'最小权限；敏感动作可控',side:'right',
   summary:'浏览、修改、执行、联网、访问密钥、安装 Skill、调用外部工具和部署生产，风险等级完全不同。把高风险动作停在清晰的审批点。',
   note:'默认原则：<b>权限只开到任务所需；任何第三方代码/Skill/脚本先审查再执行；生产、数据删除、支付与外部写入必须人工确认。</b>',
   steps:['开始前列出高风险动作及其影响范围。','密钥放环境变量/密钥管理，绝不写进代码、提示词、截图或日志。','对删除、迁移、部署、付费和外部写入设人工审批。','安装依赖、Skill、MCP 或脚本前检查来源、权限和网络行为。','为不可逆操作准备备份、预览和回滚。'],
   prompt:'开始前列出本任务的高风险动作：删除、迁移、联网、安装依赖/Skill、部署、凭据、第三方 API、生产写入。\n对每项给出：影响、最小权限、预览/备份、回滚、是否需要我确认。未经明确确认不得执行。',
   children:[
    {id:'secrets',title:'密钥与环境变量',sub:'不进仓库，不进截图，不进日志',summary:'API Key、Cookie、密码、私钥和个人数据必须隔离管理。泄漏后需要轮换，而不是只删代码。',note:'发现疑似密钥时：<b>停止回显 → 标记位置 → 轮换/撤销 → 加入忽略 → 改用环境变量 → 查 Git 历史。</b>',steps:['使用 .env.example 只保存变量名。','真实 .env、私钥、会话文件加入 .gitignore。','日志、错误和样本数据做脱敏。','泄漏后立即撤销/轮换并评估历史影响。'],prompt:'检查当前变更与仓库是否含 API Key、密码、Cookie、私钥或个人数据。不要回显具体值；说明位置、风险、脱敏、轮换和历史清理步骤。'},
    {id:'approval',title:'审批门：不可逆动作停在你手上',sub:'先预览，后确认；一次只执行一次',summary:'审批不是拖慢效率，而是将“探索”与“改变现实”分开。',note:'典型必须确认：<b>删除数据、迁移、推送远端、创建付费资源、部署生产、支付、调用外部写入 API。</b>',steps:['先提供只读检查和命令预览。','说明影响对象与预估影响量。','提供备份/快照与回滚步骤。','收到明确“确认执行”后再执行一次。'],prompt:'以下操作具有不可逆或外部影响，请停在审批点：\n- 将执行：{命令/部署/迁移}\n- 影响：{环境、数据、用户}\n- 备份与回滚：{步骤}\n等待我回复“确认执行”后再继续。'},
    {id:'supplychain',title:'依赖、Skill 与脚本供应链',sub:'来源可信 ≠ 可直接执行',summary:'高星、热门或“官方目录收录”不等于你的环境已经安全。技能包和依赖中的 scripts、网络请求、环境读取都需要最小化审查。',note:'安全顺序：<b>官方来源优先 → 固定版本/提交 → 读 SKILL.md 与 scripts → 隔离测试 → 最小权限 → 再进入正式项目。</b>',steps:['优先验证发布者、仓库、许可、维护活跃度与变更记录。','审查 SKILL.md、scripts、install hooks、网络请求和环境变量读取。','避免 curl | sh、未知二进制和自动读取全盘/凭据的脚本。','在测试仓库、容器或独立工作树先试运行。','记录安装来源、版本/提交、用途和移除方式。'],prompt:'请对以下依赖或 Skill 做只读安全审查：{名称/仓库/路径}\n输出：来源与维护者、执行文件、网络/文件/凭据权限、潜在危险命令、最小测试方式、是否建议安装。未审查前不要安装或执行。'}]},

  {id:'git',title:'07 Git、审查与交接',sub:'可追踪、可回滚、可维护',side:'right',
   summary:'Git 不只是备份工具，而是把“可运行的状态”变成可审查、可比较、可回滚的工程记录。',
   note:'提交应表达一个意图；文档应表达关键决策。<b>让未来的你或外包人员不用重新猜：为什么这样做、怎么运行、怎么验证、怎么回退。</b>',
   steps:['开始前检查 status、branch、remote 与未跟踪文件。','一项逻辑完整且已验证的变化一个提交。','提交前排除密钥、构建产物、无关格式化和临时文件。','PR/交付说明连接任务卡、方案、验证、风险和回滚。','把关键决策、调试入口与未完成项留在仓库。'],
   prompt:'请在提交前完成：\n1) 检查 git diff 与未跟踪文件；\n2) 排除密钥、构建产物和无关格式化；\n3) 建议清晰的提交拆分与 Conventional Commit 信息；\n4) 写 PR/交付摘要、风险和回滚方式。',
   children:[
    {id:'commit',title:'提交与 PR：小、清楚、可回滚',sub:'每次提交表达一个可验证意图',summary:'小提交让审查、定位、回滚和协作都更快。',note:'好提交：<b>fix(upload): reject oversized images before compression</b>；避免“update”“final final 2”这类无法追溯的描述。',steps:['提交前运行最相关验证。','不要混入重命名、格式化、无关修复。','PR 描述写清目标、方案、验证、风险、截图/证据。','合并后检查部署、日志或关键真实场景。'],prompt:'基于当前 diff，建议：\n- 最佳拆分提交方案\n- 每个提交的 Conventional Commit 信息\n- PR 标题与 5 行以内摘要\n- 审查者最该关注的 3 个风险点。'},
    {id:'handoff',title:'交接与决策记录',sub:'把上下文留在仓库，不留在脑中',summary:'长期项目的效率取决于下一次能否无痛继续，而不是这次写得多快。',note:'建议留下 1 页交接卡：<b>当前状态、运行/测试命令、关键决策、已知问题、下一步、相关链接/截图。</b>',steps:['必要时更新 README、AGENTS.md、CHANGELOG。','记录“为什么”而不仅是“做了什么”。','记录本地依赖、种子数据与调试入口。','保留能复现的验证命令和故障样本。'],prompt:'为下一位开发者生成交接说明：当前状态、重要文件、启动/测试命令、关键决策、已知限制、未完成项、建议下一步。输出 docs/handoff.md 草案。'}]},

  {id:'scale',title:'08 长任务、子代理与成本',sub:'按边界并行；保持主线程可控',side:'right',
   summary:'复杂任务的风险是上下文漂移、共享文件冲突和无效消耗。把状态外置到任务卡、计划文件、工作树和验证报告中；只有任务边界明确时才并行。',
   note:'Codex 的子代理应被明确要求才会启动，并且会额外消耗模型与工具资源。<b>并行的价值来自低耦合，不来自同时开很多代理。</b>',
   steps:['长任务先写阶段目标、停止条件和预算。','按模块/文件所有权划分并行子任务。','每个子任务单独工作树、输入、输出与验收。','定期要求“已做、证据、阻塞、下一步”摘要。','达到时间/成本上限时，先交付当前可用版本，再决定是否继续。'],
   prompt:'将此长任务拆为可并行子任务。每项必须列出：目标、允许修改目录、依赖输入、交付物、验收方式、共享文件冲突、估算成本。若并行收益不大，请给出更安全的串行顺序。',
   children:[
    {id:'parallel',title:'并行代理：按边界，不按人数',sub:'共享越少，合并成本越低',summary:'并行适合调研、实现、测试、文档等低耦合任务；不适合多个代理同时“优化同一模块”。',note:'好拆法：<b>调研 / UI / 测试 / 文档</b>；坏拆法：两个代理同时修改 authentication.ts。',steps:['先列共享文件、共享数据和接口契约。','将低耦合任务放入不同分支/工作树。','统一接口、命名、验收和交付格式。','由一个主线程审查、整合并运行全量验证。'],prompt:'请评估任务是否适合并行。若适合，给出不重叠子任务表；若不适合，说明串行顺序与原因。禁止为了并行而并行。'},
    {id:'recovery',title:'卡住时：停止、缩小、保留证据',sub:'避免错误循环与上下文漂移',summary:'当 Codex 连续猜错、测试反复失败或范围膨胀，应立即止损，回到只读诊断。',note:'停止条件：<b>同类错误连续 2 次、修改超出任务卡、需猜测业务规则、触及高风险权限。</b>',steps:['回到最后一个可运行状态。','保留报错、diff、复现步骤与日志。','缩小为最小复现或单一模块。','列出不确定性与最小下一步实验。'],prompt:'停止实施并切换为只读诊断。请输出：\n1) 失败现象与复现；\n2) 已尝试与证据；\n3) 最可能的 3 个根因；\n4) 最小下一步实验；\n5) 是否建议回滚及回滚点。'},
    {id:'subagents',title:'子代理：主线程负责集成',sub:'专长分工，统一证据与标准',summary:'子代理适合并行探索或分工执行，但主线程必须拥有最终标准、合并权和验证责任。',note:'推荐角色：<b>侦察员（只读）/ 实施者（指定文件）/ 测试员（不改业务）/ 审查员（只读）</b>。',steps:['明确每个角色的权限、输入、目录边界和输出格式。','限制每个子代理的目标与停止条件。','汇总结果时只采信可复现证据。','主线程审 diff、处理冲突、跑最终验证。'],prompt:'为该任务设计最多 4 个子代理角色。每个角色写清：只读或可写、允许目录、输入、输出、验收与禁止事项。由主线程最终整合，不允许子代理自行合并。'}]},

  {id:'scenarios',title:'09 工作类型路线图',sub:'软件、网站、自动化、内容与运营系统',side:'right',
   summary:'同一套方法可以用于代码、产品、独立站、内容自动化、数据处理、文档和内部运营系统。变化的只是验收、风险、环境和人工接管点。',
   note:'你的电商与视觉项目最容易遗漏的并不是代码，而是：<b>素材版权、平台规则、数据隐私、失败恢复和人工复核。</b>',
   steps:['软件修复/重构：优先复现、最小 diff、回归。','Web 工具：优先窄而完整的核心旅程与错误恢复。','独立站：优先交易正确性、安全、SEO、售后。','内容/图像自动化：优先队列、日志、审核和版权边界。','运营/数据工具：优先权限、审计、导入导出与人工接管。'],
   prompt:'针对以下工作类型：{软件修复/新功能/独立站/Web工具/内容自动化/数据分析/内部运营工具}，把通用流程改写成项目专用任务卡：技术边界、风险、验收、人工审批、上线后观察。',
   children:[
    {id:'webtool',title:'Web 工具：先做“窄而完整”的 MVP',sub:'一条核心用户旅程跑通',summary:'先让用户从输入到结果的核心路径完整，再补账号、历史、支付、云端与批量复杂功能。',note:'图片压缩工具第一版只做：<b>上传 → 本地压缩 → 下载 → 错误提示</b>；不要第一天就接会员、云存储、支付和队列。',steps:['定义单一核心用户任务。','先 mock 外部服务与付费能力。','优先处理失败、超限、取消和恢复。','加入最小日志与可观测性。'],prompt:'为 {工具想法} 设计 1 周 MVP：只保留一条核心旅程。列出页面、API、数据、错误场景、验收和明确不做的功能。'},
    {id:'store',title:'独立站：先守住交易关键链路',sub:'浏览 → 信任 → 下单 → 支付 → 售后',summary:'电商站的优先级不是页面花哨，而是商品、库存、订单、支付回调、数据安全和售后信息正确。',note:'上线前至少演练：<b>下单成功、付款失败、重复回调、库存不足、取消/退款、移动端、邮件通知。</b>',steps:['明确商品、库存、订单状态机。','支付只使用官方/成熟服务商集成。','回调做签名校验和幂等处理。','记录订单操作、异常与人工售后入口。'],prompt:'为 {独立站功能} 写交易链路检查表：状态机、失败分支、回调安全、库存一致性、邮件/通知、人工售后、上线前演练。'},
    {id:'automation',title:'内容与图像自动化：可审核、可停止、可追溯',sub:'队列、日志、人工审核、版权边界',summary:'内容自动化最重要的不是一次跑多少，而是能否看到每个任务做了什么、失败在哪里、能否人工复核和停止。',note:'涉及外部平台或素材时：<b>不绕过访问控制；不盲目自动发布；先保存草稿、日志与人工审核结果。</b>',steps:['把任务拆为输入、处理、审核、输出四段。','为每项任务记录状态、输入摘要与输出位置。','对失败设置重试上限、人工处理和停止按钮。','为版权、品牌口径、平台规则设置检查清单。'],prompt:'为 {内容/图像自动化} 设计可运营流程：输入来源、处理步骤、任务队列、审核点、日志字段、失败恢复、导出/发布审批、版权与隐私边界。'},
    {id:'research',title:'研究、文案与规划：先证据，后结论',sub:'事实、假设、方案、决策分开',summary:'Codex 也适合做资料梳理、需求分析、文档、数据探索与方案比较，但必须把事实、推测和建议分开。',note:'高价值输出应包含：<b>来源、时间、假设、不确定性、备选方案与下一步验证。</b>',steps:['明确研究问题与决策用途。','优先一手来源、官方文档、原始数据。','把事实、推断、建议与待验证项分栏。','将结论转成可执行的下一步任务卡。'],prompt:'围绕 {问题} 做研究与方案比较。请严格区分：已证实事实及来源、合理推断、未知项、备选方案、推荐方案与需要人工确认的决策。'}]},

  {id:'skills',title:'10 Skills、MCP 与能力库',sub:'官方优先；第三方先审；高频流程自建',side:'right',
   summary:'Skill 是可复用的任务工作流包：由 SKILL.md、可选脚本、参考资料和资源构成。它适合把重复的专业流程固化下来；规则写入 AGENTS.md，Skill 管工作流，MCP/外部工具负责连接真实系统。',
   note:'安装顺序：<b>先用官方系统/精选 Skill；再从高星目录“发现”候选；第三方一律先审代码、固定版本、隔离测试。</b>高星不等于经过安全审计。',
   steps:['识别高频、稳定、可重复的工作流。','优先使用 OpenAI 官方 System 与 Curated Skills。','第三方 Skill 先做供应链审查，再放测试仓库验证。','用 repo 级 Skill 管项目流程，用 user 级 Skill 管个人通用流程。','当流程已稳定且有验证标准时，再用 skill-creator 自建。'],
   prompt:'请评估以下工作流是否适合做成 Codex Skill：{工作流}\n输出：触发条件、非触发条件、输入/输出、是否需要脚本、风险/权限、验证方式、推荐安装范围（项目级或用户级）。若不稳定或依赖人工判断，请说明为什么不应做成 Skill。',
   sources:[
     {title:'OpenAI 官方：Agent Skills 文档',meta:'Skill 格式、触发方式、使用范围与创建方式',url:'https://developers.openai.com/codex/skills'},
     {title:'OpenAI 官方：openai/skills Catalog',meta:'System、Curated 与 Experimental Skills 的目录与安装入口',url:'https://github.com/openai/skills'},
     {title:'OpenAI 官方：用 Skills 加速维护',meta:'AGENTS.md、仓库内 Skills、脚本职责与可重复流程',url:'https://developers.openai.com/blog/skills-agents-sdk'},
     {title:'高星发现目录：VoltAgent/awesome-agent-skills',meta:'用于发现候选；仓库自身明确不保证第三方 Skill 的安全或正确性',url:'https://github.com/VoltAgent/awesome-agent-skills'}
   ],
   children:[
    {id:'officialskills',title:'官方优先：建议先装的 Skill',sub:'规划、质量、安全、浏览器测试、Git 协作',summary:'先从 OpenAI 官方技能目录选择与你当前工作直接相关的少量 Skill，不要一次装几十个，避免描述拥挤、触发混乱和维护负担。',note:'推荐顺序：<b>skill-creator / skill-installer（System）→ define-goal → create-plan（Experimental，先隔离试用）→ security-best-practices / security-threat-model → playwright / playwright-interactive → gh-fix-ci / gh-address-comments。</b>',steps:['在 Codex 中先用 /skills 查看可用项与名称。','需要安装时用 $skill-installer；一次只装一个并立刻做小任务验证。','规划类：define-goal、create-plan；质量类：playwright、screenshot；安全类：security-best-practices、security-threat-model；协作类：gh-fix-ci、gh-address-comments。','Experimental Skill 先在独立仓库/工作树试用，确认行为与权限后再用于正式项目。','不适用或长期不用的 Skill 及时移除，保持触发描述精炼。'],prompt:'在 Codex 会话中依次执行（按需选用，不要一次全装）：\n$skill-installer define-goal\n$skill-installer security-best-practices\n$skill-installer security-threat-model\n$skill-installer playwright\n$skill-installer gh-fix-ci\n\n实验性计划能力：\n$skill-installer install the create-plan skill from the .experimental folder\n\n安装后：请用一个小型、无敏感数据的任务验证该 Skill 的触发、输出与权限边界。',sources:[
      {title:'openai/skills · System Skills',meta:'包含 skill-creator 与 skill-installer',url:'https://github.com/openai/skills/tree/main/skills/.system'},
      {title:'openai/skills · Curated Skills',meta:'包含 define-goal、Playwright、Security、GitHub 等精选目录',url:'https://github.com/openai/skills/tree/main/skills/.curated'}]},
    {id:'skillscope',title:'Skill、AGENTS.md、MCP：职责别混淆',sub:'规则 / 工作流 / 外部系统连接',summary:'把三者分清，系统才不会越来越乱：AGENTS.md 管项目规则；Skill 管重复步骤与资产；MCP/外部工具连接 GitHub、数据库、浏览器、SaaS 等真实系统。',note:'判断法：<b>“永远遵守”写 AGENTS.md；“遇到某类任务按流程做”写 Skill；“需要读写外部系统”才考虑 MCP。</b>',steps:['AGENTS.md：项目约束、架构、命令、交付标准。','Skill：特定任务的触发条件、步骤、脚本、参考与模板。','MCP/外部工具：真实系统权限、输入输出和审计。','MCP 必须按最小权限、独立凭据、测试环境和人工审批设计。'],prompt:'请将以下内容分配到 AGENTS.md / Skill / MCP（或不需要）：{规则或流程列表}\n逐项说明理由、权限风险、存放位置和最小可维护实现。'},
    {id:'skillsecurity',title:'第三方 Skill 安全审查门',sub:'高星目录只负责发现，不负责担保',summary:'第三方 Skill 可能包含脚本、依赖、网络请求和环境读取。安装前必须像审查一个小型开源项目一样审查。',note:'安全红旗：<b>curl | sh、混淆代码、自动读取 ~/.ssh/.env/Cookie、要求关闭审批、自动部署/发帖/付款、无许可证或维护者不明。</b>',steps:['确认发布者、仓库归属、许可证、维护活动与 Issue。','阅读全文 SKILL.md；逐个审 scripts/、依赖清单和 install hooks。','检查文件读写范围、网络域名、环境变量与外部 API。','固定 tag/commit；在隔离仓库、容器或工作树运行。','仅授予必要权限；记录来源、版本、用途、卸载方式。'],prompt:'对 {GitHub 仓库/Skill 路径} 做只读审查。请输出：\n1) 发布者与维护信号；2) SKILL.md 触发条件；3) 所有可执行文件与依赖；\n4) 文件/网络/凭据权限；5) 红旗；6) 隔离试用步骤；7) 是否建议安装。未审查前不要下载或执行。'},
    {id:'customskill',title:'自建 Skill：把高频流程固化',sub:'先稳定流程，再自动化；先指令，后脚本',summary:'当一个流程已经稳定、重复、验收明确时，自建 Skill 比每次长提示更可靠。先用指令型 Skill；只有确定性重复机械操作才下沉成脚本。',note:'官方建议的结构是目录中的 <b>SKILL.md（name、description、instructions）</b>，可选 scripts、references、assets；描述应写清何时触发和何时不触发。',steps:['选择高频且边界稳定的流程。','先写清触发/非触发、输入、步骤、输出和验收。','默认先做 instruction-only；机械重复命令才加入脚本。','项目级可放 .codex/skills/；个人通用可放 ~/.codex/skills/。','通过真实任务评估触发准确性、输出质量和副作用。'],prompt:'使用 $skill-creator 帮我创建一个 Skill：\n用途：{例如：为电商图片工具生成发布前检查报告}\n触发：{什么时候使用}\n非触发：{什么时候不要使用}\n输入：{文件/信息}\n输出：{报告/文件/命令}\n限制：{安全、权限、禁止事项}\n验收：{如何判断成功}\n先生成 instruction-only 版本，并给出 3 个测试任务。',sources:[
      {title:'OpenAI 官方：Skill 创建与作用域',meta:'SKILL.md、repo/user 级路径、skill-creator',url:'https://developers.openai.com/codex/skills'},
      {title:'OpenAI 官方：Skill 评估实践',meta:'名称/描述、触发准确性与测试思路',url:'https://developers.openai.com/blog/eval-skills'}]},
    {id:'catalogs',title:'高星目录：用于发现，不直接信任',sub:'优先官方发布者；再隔离审查',summary:'高星目录能帮助你发现广泛使用的技能包，但不能替代安全审查。尤其是含脚本、浏览器、SaaS、部署和写入操作的 Skill。',note:'安全推荐顺序：<b>OpenAI 官方 catalog → 原厂/平台官方仓库（如测试、部署、支付服务）→ 高星目录中的原始发布者仓库 → 不明来源不装。</b>',steps:['从目录找到候选后回到原始发布者仓库。','检查 Skill 是否与 Codex 兼容、是否仍维护、是否说明权限。','只选择你真实会用的少量 Skill，避免“收藏式安装”。','审查后固定版本，并在测试项目验证。'],prompt:'请从以下高星目录中为 {你的任务} 筛选 3 个候选 Skill：\n- 仅选原厂或知名维护者发布的项目；\n- 排除需要不必要广泛权限、自动外部写入或来源不明的项目；\n- 输出原始仓库、用途、权限、审查要点、隔离试用方式。\n不要替我直接安装。',sources:[
      {title:'VoltAgent/awesome-agent-skills',meta:'高星发现目录；其 README 明确说明未审计、不保证安全与正确性',url:'https://github.com/VoltAgent/awesome-agent-skills'},
      {title:'ComposioHQ/awesome-codex-skills',meta:'Codex Skills 分类目录与安装示例；先回到原始 Skill 仓库审查',url:'https://github.com/ComposioHQ/awesome-codex-skills'}]}
   ]},

  {id:'containers',title:'11 容器化开发环境',sub:'Container Tools + Dev Containers：环境可见、可重建、可交接',side:'right',
   summary:'这一分支解决“开发工具装在哪里、依赖怎么固定、换电脑或换人如何快速复现”的问题。Container Tools 用于查看和管理 Docker 资产；Dev Containers 把项目所需运行时、工具链和 VS Code 配置写进仓库，使 Codex 在更一致、可回滚的环境里工作。',
   note:'推荐顺序：<b>先在本地验证项目能跑 → 再用 Dev Container 固化依赖 → 用 Container Tools 看镜像、容器、日志、端口和卷。</b>不要为了“容器化”而把每个小脚本都复杂化。',
   steps:['先判断是否真的需要容器：依赖复杂、多人协作、需 Linux 一致性、要避免本机污染时再使用。','在仓库加入 .devcontainer/，把关键运行时、工具和启动方式版本化。','把生产 Dockerfile 与开发 Dev Container 分开思考：开发优先调试和体验，生产优先最小镜像和运行安全。','使用 Container Tools 检查镜像、容器、卷、网络、日志和端口；危险动作先预览再执行。','重建、迁移或换电脑后，用同一组验证命令证明环境可复现。'],
   prompt:'请为当前项目判断是否需要 Dev Container。先只读分析：技术栈、依赖复杂度、团队/迁移需求、Linux 一致性、敏感数据与本机污染风险。输出：\n1) 不使用容器的可行方案；2) 最小 Dev Container 方案；3) 成本与风险；4) 推荐路径。\n不要直接创建或修改容器文件。',
   prompts:[
    {label:'环境决策模板',text:'请为当前项目做“本地开发 vs Dev Container”决策。请基于依赖复杂度、跨平台差异、换机频率、多人协作、GPU/服务依赖、敏感数据与启动耗时评分。输出推荐方案、最小配置、明确不做项与回滚方式。先只读分析。'},
    {label:'容器化实施模板',text:'请只为开发环境创建最小 .devcontainer 配置：固定运行时与必要工具；默认非 root 用户；不把密钥写入镜像；不自动安装无关扩展；列出 rebuild 后的验证命令。先给出文件清单和计划，等我确认后再写。'},
    {label:'环境审查模板',text:'请审查当前 Dockerfile、docker-compose.yml 与 .devcontainer。重点检查：是否混淆开发与生产、是否 root 运行、是否复制密钥、是否固定基础镜像版本、端口/卷是否过度暴露、是否有重复依赖。给出最小修复建议，不直接修改。'}],
   sources:[

     {title:'OpenAI 官方：Codex 与 Dev Containers 示例',meta:'Codex 在 Dev Container 中的隔离使用方式',url:'https://developers.openai.com/codex/llms-full.txt'}

   children:[
    {id:'container-tools',title:'Container Tools：看见并管理 Docker 资产',sub:'容器、镜像、卷、网络、日志与端口',summary:'Container Tools 是 VS Code 中面向 Docker 工作流的管理与调试入口。它适合让你清楚看到“现在跑着什么、占着什么、日志在哪里”，而不是把所有动作都交给命令记忆。',note:'使用原则：<b>先查看，再删除；先读日志，再重启；不要为了清理磁盘随意删卷。</b>卷可能存放数据库或本地开发数据。',steps:['用 Container Explorer 核对容器、镜像、卷、网络和端口状态。','先查看日志与环境，再决定是否重启、重建或进入容器。','对陌生卷、镜像和网络先确认归属，避免删除正在使用的数据。','将重复运行/调试动作写进 tasks 或文档，避免每次手工猜命令。'],prompt:'请基于当前项目生成一份“Container Tools 操作清单”：需要观察的容器、镜像、卷、端口和日志；哪些操作只读，哪些操作必须确认；以及一次安全的重建与验证顺序。',
     prompts:[
      {label:'运行状态排查',text:'请只读检查当前 Docker 环境，列出：运行中容器、镜像、卷、网络、端口映射、异常退出容器及最近错误日志。不要停止、删除、重建或拉取任何资源。最后给出最小诊断结论。'},
      {label:'安全清理计划',text:'请先不要执行清理。根据 Docker 资源清单，把可安全删除、需要确认、绝对不要删三类资源分开；说明每项依据、可能丢失的数据、备份/导出方法与回滚不可行项。'},
      {label:'容器日志诊断',text:'请分析指定容器的日志与状态，定位启动失败或端口冲突的最可能原因。输出复现证据、最小修复步骤、验证命令与不建议尝试的高风险操作。不要直接修改或重启。'}],
     sources:[{title:'Microsoft 官方：Container Tools Overview',meta:'Container Explorer 可查看和管理容器、镜像、卷、网络与注册表',url:'https://code.visualstudio.com/docs/containers/overview'}]},
    {id:'devcontainers',title:'Dev Containers：把开发环境写进仓库',sub:'devcontainer.json / Dockerfile / Compose / 重建验证',summary:'Dev Containers 使用 devcontainer.json 描述如何创建或连接一个包含固定工具链的开发环境。它适合将运行时、扩展、端口转发和项目启动方式变成可复现配置。',note:'最重要的不是“装得多”，而是<b>最小、可重建、非 root、无密钥、文档化</b>。手工在容器里安装的工具会在重建后消失，应沉淀到配置或 Dockerfile。',steps:['从最小镜像或现有 Docker Compose 开始，不要先堆大量 features。','将必要工具、端口、扩展和初始化命令写入 .devcontainer。','需要持久化的依赖用 Dockerfile / features / 配置声明，不依赖手工安装。','设置非 root remoteUser；密钥继续通过宿主或受控注入管理。','每次修改配置后重建容器并运行安装、测试、构建验证。'],prompt:'请为 {项目技术栈} 设计最小 .devcontainer：基础镜像或 Dockerfile、remoteUser、必要 VS Code 扩展、forwardPorts、初始化命令、持久化策略、禁止挂载/注入的敏感内容。先说明取舍，再生成文件草案。',
     prompts:[
      {label:'最小配置生成',text:'为当前仓库生成最小 .devcontainer/devcontainer.json 草案。要求：只包含实际需要的语言运行时和工具；使用非 root 用户；不写入 .env、Cookie、私钥；列出要转发的端口；提供启动后执行的验证命令。先输出计划与风险。'},
      {label:'现有配置瘦身',text:'请审查现有 .devcontainer、Dockerfile 和 Compose 文件，找出不必要的扩展、重复安装、过宽权限、过多端口、开发/生产混用和重建后会丢失的手工步骤。输出精简方案与影响，不直接修改。'},
      {label:'可复现验证',text:'请为 Dev Container 设计“从零重建验收”：克隆仓库→Reopen/Rebuild→依赖安装→启动→测试→构建。列出每一步预期结果、失败信号、日志位置和恢复方式。'}],
     sources:[{title:'Microsoft 官方：Create a Dev Container',meta:'devcontainer.json、Dockerfile、Compose、Rebuild Container 与仓库共享',url:'https://code.visualstudio.com/docs/devcontainers/create-dev-container'}]},
    {id:'container-security',title:'容器安全与开发基线',sub:'最小镜像、非 root、密钥隔离、端口与卷最小化',summary:'容器能隔离依赖，但不会自动安全。开发容器与应用容器仍需控制用户权限、镜像来源、密钥、端口、卷和 Docker daemon 权限。',note:'关键提醒：<b>Docker socket、宿主目录全量挂载、privileged、root 用户、把密钥 COPY 进镜像</b> 都是高风险点；只有在明确理由和审批下才使用。',steps:['固定可信基础镜像/版本，记录更新策略。','优先非 root 用户与高端口，限制 capabilities 与特权模式。','不要把 .env、SSH 私钥、会话文件写进镜像或提交。','卷和端口按任务最小化；测试数据与正式数据严格隔离。','容器配置变化也走 diff 审查与重建验证。'],prompt:'请对当前容器配置做开发安全审查：基础镜像、用户、端口、卷、Docker socket、capabilities、特权模式、密钥、网络和构建上下文。按“阻断 / 高风险 / 建议”分级，并给出最小修复与验证步骤。',
     prompts:[
      {label:'容器安全审计',text:'请只读审查当前 Dockerfile、Compose 和 devcontainer 配置。重点找：root、privileged、Docker socket 挂载、宿主目录全量挂载、COPY 密钥、宽泛端口、未固定镜像、危险 postCreateCommand。输出风险分级与最小修复建议。'},
      {label:'安全默认值设计',text:'请为一个新的开发容器给出安全默认值：非 root 用户、最少端口、只读/最小卷、密钥注入原则、基础镜像更新、日志脱敏、重建与清理策略。注明哪些项需要按项目调整。'},
      {label:'变更前审批',text:'以下容器配置准备变更：{描述}。请先说明影响的宿主文件、网络、端口、数据卷、权限与密钥；提供预览、备份、回滚和验收命令。未得到确认不要修改。'}],
     sources:[{title:'Microsoft 官方：Container Tools Tips',meta:'非 root 运行与常见容器开发排查建议',url:'https://code.visualstudio.com/docs/containers/troubleshooting'}]}
   ]},

  {id:'remote',title:'12 远程开发与安全连接',sub:'Remote-SSH + Remote Tunnels：远程算力可控接入',side:'right',
   summary:'远程开发的关键不是“把本地 VS Code 画面搬过去”，而是让代码、运行时和算力在合适的远程环境中运行，同时保持身份、权限、端口、日志和 Git 状态可控。已有 SSH 时优先 Remote-SSH；无法方便配置 SSH 时再考虑 Remote Tunnels。两者都可与 Dev Containers 组合。',
   note:'不要把远程连接等同于生产权限。<b>开发服务器、测试服务器、生产服务器应分开；Codex 只拿到任务所需目录与权限；远程凭据不能直接写进仓库或提示词。</b>',
   steps:['先确定远程目标是开发机、测试机、GPU/算力机还是生产环境；生产环境只做受控诊断/发布。','有稳定 SSH、密钥与主机管理能力时选 Remote-SSH；无公开 SSH、需临时从外部访问时评估 Remote Tunnels。','远程主机上仍保持 Git 分支/工作树、日志、环境变量和备份的独立性。','需要一致工具链时，在远程主机上再用 Dev Container，而不是将本地 Docker 强行暴露出去。','远程端口转发、共享链接和外部访问按最小暴露原则设置，并在任务后关闭。'],
   prompt:'请为 {远程开发需求} 选择 Remote-SSH / Remote Tunnels / 远程主机上的 Dev Container 组合。输出：目标环境、访问方式、身份与权限、代码位置、端口策略、数据/密钥边界、日常工作流、故障恢复与明确禁止的操作。先只读规划。',
   prompts:[
    {label:'远程方案决策模板',text:'请基于以下条件，为我比较 Remote-SSH、Remote Tunnels、远程 Dev Container 三种方案：{网络条件/是否有固定 IP/是否可配置 SSH/算力/团队协作/数据敏感性/预算}。输出推荐拓扑、理由、最小前置条件、风险、日常使用流程和不推荐的方案。'},
    {label:'远程环境交接模板',text:'请为一台远程开发机生成交接清单：OS 与版本、项目路径、Git 分支/工作树、运行命令、服务端口、日志位置、Docker/Dev Container 状态、凭据存放原则、备份与恢复、禁止操作。不得输出任何真实密钥。'},
    {label:'远程安全复核模板',text:'请作为安全审查者检查远程开发方案：SSH/Tunnel 身份认证、目录权限、端口转发、远程 Git 凭据、日志脱敏、生产隔离、Docker 权限、任务结束后的连接/端口清理。按阻断/高风险/建议输出。'}],
   sources:[
     {title:'Microsoft 官方：VS Code Remote Development Overview',meta:'Remote-SSH、Dev Containers、Remote Tunnels 的定位与选择',url:'https://code.visualstudio.com/docs/remote/remote-overview'},
     {title:'OpenAI 官方：Codex Remote Connections',meta:'Codex App 通过 SSH 使用远程项目的方式',url:'https://developers.openai.com/codex/remote-connections'},
     {title:'OpenAI 官方：Codex 审批与安全',meta:'Windows/WSL2 与权限、沙箱相关设置',url:'https://developers.openai.com/codex/agent-approvals-security'}
   ],
   children:[
    {id:'remote-ssh',title:'Remote-SSH：有 SSH 时的主力方案',sub:'远程目录、终端、扩展与运行时都在主机上',summary:'Remote-SSH 适合连接有 SSH 服务的开发机、虚拟机或服务器。VS Code 在远程环境中运行其服务端组件，使你可以像本地一样编辑、调试和运行，但文件与命令实际位于远程主机。',note:'建议：<b>使用独立开发用户、SSH 密钥、明确项目目录和最小 sudo；不要用 root 直接开发。</b>先用命令行 ssh 验证主机指纹与登录，再交给 VS Code。',steps:['先用 SSH CLI 建立并验证主机指纹，不忽略未知主机提示。','为开发使用独立账号与密钥；限制权限和目录范围。','连接后先检查 pwd、whoami、git status、环境变量与当前服务。','在远程仓库继续遵守分支/工作树与任务卡流程。','端口转发仅开放需要的开发端口，完成后关闭。'],prompt:'请为 {远程主机用途} 制定 Remote-SSH 接入计划：开发用户、SSH 密钥、项目目录、最小权限、Git 身份、服务端口、日志位置、备份、连接验证和任务结束清理。不要提供或要求明文私钥。',
     prompts:[
      {label:'SSH 接入检查',text:'在连接远程主机前，请给我一份只读验证清单：主机别名、主机指纹确认、开发用户、密钥位置原则、项目目录、磁盘/内存、Docker 状态、Git 身份、端口占用。不要修改 sshd、不要创建用户、不要更改防火墙。'},
      {label:'远程任务启动',text:'已通过 Remote-SSH 打开项目。请先只读输出：pwd、whoami、git status、当前分支、项目启动/测试命令、环境变量名称（不回显值）、运行中服务和日志位置。确认无误后再为 {任务} 给最小实施计划。'},
      {label:'远程故障恢复',text:'远程开发出现 {问题}。请先收集非破坏性证据：连接状态、磁盘、内存、容器、端口、日志和 Git 状态。给出最小恢复步骤与是否需要人工审批；禁止直接重启整机、删除目录或清空 Docker 资源。'}],
     sources:[{title:'Microsoft 官方：Remote Development using SSH',meta:'Remote-SSH 连接远程主机/VM/容器的工作方式',url:'https://code.visualstudio.com/docs/remote/ssh'}]},
    {id:'remote-tunnels',title:'Remote Tunnels：无 SSH 或临时安全接入',sub:'经安全隧道连接远程机器，适合外网与无端口暴露场景',summary:'Remote Tunnels 可让 VS Code 通过安全隧道访问一台远程机器，适用于不方便暴露 SSH、需要从不同网络访问工作机或临时远程协作的场景。它不是生产运维通道，也不能替代合理的身份与权限管理。',note:'使用要求：<b>明确哪台机器在运行 tunnel、谁可以登录、隧道何时关闭、哪些端口可转发。</b>不把它当成长期开着且无人维护的后门。',steps:['为 Tunnel 主机设置独立开发账号与系统更新策略。','使用受控的账户登录与命名，记录所有者和用途。','只开放项目目录与必要端口；不把生产凭据放到 Tunnel 主机。','任务完成后关闭未使用的隧道与端口转发。','定期审查已注册设备、访问账户和失效连接。'],prompt:'请为 {远程工作机} 设计 Remote Tunnels 使用方案：主机用途、登录账户、项目目录、端口策略、数据/密钥边界、开启/关闭责任、审计清单和应急断开步骤。不要把 Tunnel 当作生产管理后门。',
     prompts:[
      {label:'Tunnel 适用性判断',text:'请判断以下场景是否适合 Remote Tunnels：{场景}。与 Remote-SSH 对比网络要求、身份管理、审计、临时性、端口暴露、团队协作和风险；给出推荐与不推荐理由。'},
      {label:'Tunnel 启用前清单',text:'在启用 Remote Tunnel 前，请列出必须确认的项目：远程主机所有者、登录账号、系统更新、项目目录权限、运行服务、端口转发、凭据隔离、停止方式、失联时的本地恢复。只生成清单，不执行。'},
      {label:'隧道收尾检查',text:'请为一次 Remote Tunnels 工作结束生成收尾清单：关闭不需要的端口、停止未用服务、检查 Git 状态、清理临时文件、确认无凭据落盘、记录未完成项、确认 Tunnel 是否需要关闭。'}],
     sources:[{title:'Microsoft 官方：Developing with Remote Tunnels',meta:'Remote Tunnels 连接远程机器的官方指南',url:'https://code.visualstudio.com/docs/remote/tunnels'}]},
    {id:'remote-container',title:'组合路线：远程主机 → Dev Container → Codex',sub:'远程算力与可复现工具链同时获得',summary:'对于 Linux/GPU/算力机或复杂服务，你可以先用 Remote-SSH 或 Remote Tunnels 打开远程仓库，再用 Dev Containers 在远程主机的 Docker 环境中重开项目。这样代码、依赖和运行时都在远程，同时环境配置仍可版本化。',note:'优先级：<b>Remote-SSH/Tunnel 解决“到哪台机器”；Dev Container 解决“机器里用什么环境”；Codex 解决“在受控环境中如何完成任务”。</b>',steps:['先确认远程主机 Docker、磁盘、网络、用户权限和项目目录。','通过 SSH 或 Tunnel 打开远程目录，再执行 Dev Containers: Reopen in Container。','容器配置写入仓库；远程主机凭据和项目密钥不写入镜像。','把端口转发、日志、缓存和卷的生命周期写清楚。','结束时验证 Git 状态、停止不需要的服务和端口暴露。'],prompt:'请为“远程主机 + Dev Container + Codex”设计最小工作流。输出拓扑、每层职责、所需扩展、远程主机前置条件、devcontainer 要点、端口/卷/密钥边界、启动与关闭步骤、验证清单。先只读规划。',
     prompts:[
      {label:'组合拓扑设计',text:'请为 {项目/远程主机} 设计 Remote-SSH 或 Remote Tunnels → Dev Container → Codex 的三层拓扑。逐层说明：代码在哪里、命令在哪里执行、Docker 在哪里、凭据在哪里、端口怎样转发、日志在哪里、谁有审批权。'},
      {label:'远程容器预检',text:'在远程主机上进入 Dev Container 前，请只读检查：Docker 可用性、当前用户权限、磁盘、内存、项目目录、Git 状态、端口占用、已有容器/卷、.devcontainer 文件、敏感文件暴露风险。输出是否适合重开容器。'},
      {label:'收尾与可复现交接',text:'请为远程 Dev Container 项目生成交接与收尾文档：连接方式、项目路径、Rebuild 命令、启动/测试/构建命令、端口、日志、工作树、密钥原则、停止/清理方式和已知风险。不要记录真实凭据。'}],
     sources:[{title:'Microsoft 官方：Develop on a Remote Docker Host',meta:'Remote-SSH/Remote Tunnels 与 Dev Containers 的组合方式',url:'https://code.visualstudio.com/remote/advancedcontainers/develop-remote-host'}]}
   ]}
 ]
};

const flat=[]; const map=new Map();
(function walk(n,parent=null,depth=0){n.parent=parent;n.depth=depth;n.collapsed=false;flat.push(n);map.set(n.id,n);(n.children||[]).forEach(c=>walk(c,n,depth+1));})(data);
const nodesEl=document.getElementById('nodes'),edgesEl=document.getElementById('edges'),controlsEl=document.getElementById('controls'),canvas=document.getElementById('canvas'),world=document.getElementById('world'),tooltip=document.getElementById('tooltip'),detail=document.getElementById('detail');
const app=document.querySelector('.app'),sidebarToggleBtn=document.getElementById('sidebarToggle');
const SIDEBAR_STORAGE_KEY='codex-mindmap-sidebar-mode';
function readSidebarMode(){try{return localStorage.getItem(SIDEBAR_STORAGE_KEY)==='closed'?'closed':'open'}catch(e){return 'open'}}
function setSidebarMode(mode,shouldPersist=true){
  const closed=mode==='closed';
  app.classList.toggle('sidebar-closed',closed);
  app.classList.toggle('sidebar-open',!closed);
  const label=closed?'打开右侧侧边栏':'关闭右侧侧边栏';
  sidebarToggleBtn.title=label;
  sidebarToggleBtn.setAttribute('aria-label',label);
  sidebarToggleBtn.setAttribute('aria-expanded',String(!closed));
  if(shouldPersist){try{localStorage.setItem(SIDEBAR_STORAGE_KEY,closed?'closed':'open')}catch(e){}}
  requestAnimationFrame(()=>{if(selected)focusNode(selected,true);else updateTransform();});
}
sidebarToggleBtn.addEventListener('click',()=>{
  const next=app.classList.contains('sidebar-closed')?'open':'closed';
  setSidebarMode(next);
  showToast(next==='open'?'右侧侧边栏已打开':'右侧侧边栏已关闭');
});
const isTouchDevice=window.matchMedia?.('(hover:none) and (pointer:coarse)').matches || navigator.maxTouchPoints>0;
let initialSidebarMode=readSidebarMode();
try{if(isTouchDevice && localStorage.getItem(SIDEBAR_STORAGE_KEY)===null)initialSidebarMode='closed'}catch(e){if(isTouchDevice)initialSidebarMode='closed'}
setSidebarMode(initialSidebarMode,false);
let selected=null,scale=.57,pan={x:0,y:0},dragging=false,start={x:0,y:0};
let nodeEls=new Map(),edgeEls=new Map();
const annotationPopover=document.getElementById('tooltip');

function focusNode(n,shouldZoom=true){

  // Fit the highlighted route as large as possible while retaining a thin no-clipping margin.
  const inset=Math.max(24,Math.min(40,Math.round(Math.min(rect.width,rect.height)*0.035)));

  const usableHeight=Math.max(120,rect.height-inset*2);

function getExamples(n){

function copyValue(value,successMessage){
  const done=()=>showToast(successMessage);
  const failed=()=>showToast('复制失败，请手动选择文本');
  if(navigator.clipboard&&window.isSecureContext){
    navigator.clipboard.writeText(value).then(done).catch(()=>fallbackCopy(value)?done():failed());
  }else if(fallbackCopy(value)){done()}else{failed()}
}
function fallbackCopy(value){
  const textarea=document.createElement('textarea');
  textarea.value=value;textarea.setAttribute('readonly','');textarea.style.position='fixed';textarea.style.opacity='0';
  document.body.appendChild(textarea);textarea.select();
  let ok=false;try{ok=document.execCommand('copy')}catch(e){ok=false}
  textarea.remove();return ok;
}

  let placement='right',left=r.right+gap,top=r.top+r.height/2-h/2;
  const spaceRight=vw-r.right,spaceLeft=r.left,spaceBottom=vh-r.bottom,spaceTop=r.top;
  if(spaceRight<w+gap&&spaceLeft>=w+gap){placement='left';left=r.left-w-gap;}
  else if(spaceRight<w+gap&&spaceLeft<w+gap&&spaceBottom>=h+gap){placement='bottom';left=r.left+r.width/2-w/2;top=r.bottom+gap;}
  else if(spaceRight<w+gap&&spaceLeft<w+gap&&spaceTop>=h+gap){placement='top';left=r.left+r.width/2-w/2;top=r.top-h-gap;}
  left=Math.max(10,Math.min(vw-w-10,left));top=Math.max(10,Math.min(vh-h-10,top));
  annotationPopover.dataset.placement=placement;
  if(placement==='left'||placement==='right')annotationPopover.style.setProperty('--arrow-y',`${Math.max(18,Math.min(h-18,r.top+r.height/2-top))}px`);
  else annotationPopover.style.setProperty('--arrow-x',`${Math.max(18,Math.min(w-18,r.left+r.width/2-left))}px`);
  annotationPopover.style.left=`${left}px`;annotationPopover.style.top=`${top}px`;
}
annotationPopover.addEventListener('pointerenter',()=>clearTimeout(annotationHideTimer));
annotationPopover.addEventListener('pointerleave',()=>{if(!annotationLocked)hideAnnotation()});
document.addEventListener('pointerdown',e=>{if(!annotationPopover.contains(e.target)&&!e.target.closest('.term-token,.code-end-note'))hideAnnotation(true)});
function syncFloatingControlOverlap(){
  if(!searchWrap||!toolbarEl)return;
  const rects=[...nodeEls.values()].map(el=>el.getBoundingClientRect());
  const overlaps=el=>{const r=el.getBoundingClientRect();return rects.some(n=>n.right>r.left&&n.left<r.right&&n.bottom>r.top&&n.top<r.bottom)};
  searchWrap.classList.toggle('ui-obscured',overlaps(searchWrap));
  toolbarEl.classList.toggle('ui-obscured',overlaps(toolbarEl));
}

function showToast(t){const x=document.getElementById('toast');x.textContent=t;x.classList.add('show');setTimeout(()=>x.classList.remove('show'),1800)}

const activePointers=new Map();
let pinchState=null;
function getTwoPointers(){return [...activePointers.values()].slice(0,2)}
function pointerDistance(a,b){return Math.hypot(a.x-b.x,a.y-b.y)}
function pointerMidpoint(a,b){return{x:(a.x+b.x)/2,y:(a.y+b.y)/2}}
function beginPinch(){
  const [a,b]=getTwoPointers();if(!a||!b)return;
  const r=canvas.getBoundingClientRect(),mid=pointerMidpoint(a,b);
  pinchState={distance:Math.max(1,pointerDistance(a,b)),scale,midX:mid.x-r.left,midY:mid.y-r.top,worldX:(mid.x-r.left-pan.x)/scale,worldY:(mid.y-r.top-pan.y)/scale};
  dragging=false;canvas.classList.remove('dragging');
}
canvas.addEventListener('pointerdown',e=>{
  if(e.target.closest('.node,.toggle-chip,.toolbar,.search-wrap,.sidebar-toggle,.term-token,.code-end-note'))return;
  if(e.pointerType==='touch')e.preventDefault();
  activePointers.set(e.pointerId,{x:e.clientX,y:e.clientY});
  canvas.setPointerCapture?.(e.pointerId);
  if(activePointers.size===1){dragging=true;canvas.classList.add('dragging');start={x:e.clientX-pan.x,y:e.clientY-pan.y};pinchState=null;hideAnnotation(true)}
  else if(activePointers.size===2){beginPinch();hideAnnotation(true)}
},{passive:false});
canvas.addEventListener('pointermove',e=>{
  if(!activePointers.has(e.pointerId))return;
  if(e.pointerType==='touch')e.preventDefault();
  activePointers.set(e.pointerId,{x:e.clientX,y:e.clientY});
  if(activePointers.size>=2&&pinchState){
    const [a,b]=getTwoPointers();const r=canvas.getBoundingClientRect(),mid=pointerMidpoint(a,b);
    const nextScale=Math.max(.18,Math.min(2.35,pinchState.scale*(pointerDistance(a,b)/pinchState.distance)));
    scale=nextScale;pan.x=(mid.x-r.left)-pinchState.worldX*scale;pan.y=(mid.y-r.top)-pinchState.worldY*scale;updateTransform();return;
  }
  if(!dragging)return;pan.x=e.clientX-start.x;pan.y=e.clientY-start.y;updateTransform();
},{passive:false});
function endCanvasPointer(e){
  activePointers.delete(e.pointerId);
  if(activePointers.size===1){const [remaining]=activePointers.values();dragging=true;canvas.classList.add('dragging');start={x:remaining.x-pan.x,y:remaining.y-pan.y};pinchState=null}
  else if(activePointers.size===0){dragging=false;pinchState=null;canvas.classList.remove('dragging')}
}
canvas.addEventListener('pointerup',endCanvasPointer);canvas.addEventListener('pointercancel',endCanvasPointer);canvas.addEventListener('lostpointercapture',endCanvasPointer);
canvas.addEventListener('wheel',e=>{e.preventDefault();const before=scale;scale=Math.max(.18,Math.min(2.35,scale*(e.deltaY<0?1.1:.9)));const r=canvas.getBoundingClientRect(),mx=e.clientX-r.left,my=e.clientY-r.top;pan.x=mx-(mx-pan.x)*(scale/before);pan.y=my-(my-pan.y)*(scale/before);updateTransform()},{passive:false});
canvas.addEventListener('click',e=>{if(e.target===canvas||e.target.id==='viewport'){selected=null;render();detail.innerHTML='<div class="empty">点击节点打开操作卡；在 iPad/iPhone 上可单指拖动画布、双指缩放。<br><br>建议首次按顺序阅读：<br>① 目标与边界 → ② 只读预检与规则 → ③ 执行空间 → ④ 执行与验证 → ⑤ 安全、交付、容器与能力库；<br>之后把它当成每次给 Codex 派活前的检查表。</div>'}});

document.getElementById('zoomIn').onclick=()=>{scale=Math.min(1.45,scale*1.15);updateTransform()};document.getElementById('zoomOut').onclick=()=>{scale=Math.max(.42,scale*.87);updateTransform()};
document.getElementById('expandAll').onclick=()=>{flat.forEach(n=>n.collapsed=false);render();showToast('已展开全部分支')};
document.getElementById('collapseAll').onclick=()=>{flat.forEach(n=>{if(n.depth>=1)n.collapsed=true});render();showToast('已收起到一级')};
const search=document.getElementById('search'),results=document.getElementById('searchResults');
function doSearch(){const q=search.value.trim().toLowerCase();if(!q){results.classList.remove('show');return}const hits=flat.filter(n=>(n.title+' '+(n.sub||'')+' '+(n.summary||'')).toLowerCase().includes(q)).slice(0,8);results.innerHTML=hits.length?hits.map(n=>`<div class="result" data-id="${n.id}"><span>${escapeHtml(n.title)}</span>${n.sub?' · '+escapeHtml(n.sub):''}</div>`).join(''):'<div class="result">没有匹配节点</div>';results.classList.add('show');results.querySelectorAll('[data-id]').forEach(el=>el.onclick=()=>{const n=map.get(el.dataset.id);let p=n.parent;while(p){p.collapsed=false;p=p.parent}search.value='';results.classList.remove('show');selectNode(n)});}
search.addEventListener('input',doSearch);search.addEventListener('keydown',e=>{if(e.key==='Escape'){search.value='';results.classList.remove('show');search.blur()}});document.addEventListener('keydown',e=>{if(e.key==='/'&&!['INPUT','TEXTAREA'].includes(document.activeElement.tagName)){e.preventDefault();search.focus()}if(e.key==='0'){scale=.57;pan={x:0,y:0};updateTransform()}if(e.key==='Escape')hideAnnotation(true)});
window.addEventListener('resize',()=>{if(selected)focusNode(selected,true);else updateTransform()});
render();
</script>
